<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arterial Pressure Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 95%;
            max-width: 1200px;
            background: #1e293b;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #0f172a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            text-align: center;
            position: relative;
        }
        .stat-value {
            font-size: 42px;
            font-weight: 800;
            margin: 5px 0;
        }
        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        /* Specific Colors for MAP */
        #mapDisplay { color: #22c55e; }      /* Green */
        #sysDisplay { color: #ef4444; }      /* Red */
        #diaDisplay { color: #3b82f6; }      /* Blue */
        #liveDisplay { color: #f8fafc; font-size: 24px; }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 25px;
            background: #334155;
            padding: 15px;
            border-radius: 8px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 24px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn-connect { background: #22c55e; color: #052e16; }
        .btn-connect:hover { background: #4ade80; }
        .btn-disconnect { background: #ef4444; color: #450a0a; }
        
        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input {
            background: #0f172a;
            color: white;
            border: 1px solid #475569;
            padding: 8px;
            border-radius: 4px;
            width: 60px;
        }
        .chart-container {
            position: relative;
            height: 450px;
            width: 100%;
            background: #0f172a;
            border-radius: 8px;
            padding: 10px;
        }
        #status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: #450a0a;
            color: #fca5a5;
        }
        #status.connected {
            background: #064e3b;
            color: #6ee7b7;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 24px;">Arterial Pressure Monitor</h1>
            <p style="margin:5px 0 0; color: #94a3b8; font-size: 14px;">Real-time MAP, Systolic, and Diastolic Analysis</p>
        </div>
        <div id="status">DISCONNECTED</div>
    </div>

    <div class="controls">
        <button id="connectBtn" class="btn-connect">Connect Port</button>
        <div class="input-group">
            <label>MAP Window (sec):</label>
            <input type="number" id="windowSec" value="4" min="1" max="30">
        </div>
        <div class="input-group">
            <label>History (sec):</label>
            <input type="number" id="historySec" value="15" min="5" max="300">
        </div>
        <button id="clearBtn" style="background: #475569; color: white;">Reset Scale</button>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Systolic (Peak)</div>
            <div id="sysDisplay" class="stat-value">--</div>
            <div class="stat-label">mmHg</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Diastolic (Trough)</div>
            <div id="diaDisplay" class="stat-value">--</div>
            <div class="stat-label">mmHg</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">MAP (Mean)</div>
            <div id="mapDisplay" class="stat-value">--</div>
            <div class="stat-label">mmHg</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Live Signal</div>
            <div id="liveDisplay" class="stat-value">0.0</div>
            <div class="stat-label">mmHg</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="pressureChart"></canvas>
    </div>
</div>

<script>
    let port, reader;
    let dataBuffer = []; // Objects: {t: timestamp, v: value}
    
    const connectBtn = document.getElementById('connectBtn');
    const statusDiv = document.getElementById('status');
    const mapDisplay = document.getElementById('mapDisplay');
    const sysDisplay = document.getElementById('sysDisplay');
    const diaDisplay = document.getElementById('diaDisplay');
    const liveDisplay = document.getElementById('liveDisplay');
    const windowInput = document.getElementById('windowSec');
    const historyInput = document.getElementById('historySec');

    const ctx = document.getElementById('pressureChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            datasets: [
                {
                    label: 'Arterial Waveform',
                    borderColor: '#f8fafc',
                    borderWidth: 2,
                    data: [],
                    pointRadius: 0,
                    tension: 0.3
                },
                {
                    label: 'Mean (MAP)',
                    borderColor: '#22c55e',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    data: [],
                    pointRadius: 0,
                    fill: false
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            scales: {
                x: {
                    type: 'linear',
                    display: true,
                    title: { display: true, text: 'Seconds', color: '#94a3b8' },
                    grid: { color: '#334155' },
                    ticks: { color: '#94a3b8' }
                },
                y: {
                    beginAtZero: true,
                    title: { display: true, text: 'Pressure (mmHg)', color: '#94a3b8' },
                    grid: { color: '#334155' },
                    ticks: { color: '#94a3b8' }
                }
            },
            plugins: {
                legend: { labels: { color: '#f8fafc' } }
            }
        }
    });

    async function connect() {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            statusDiv.textContent = 'CONNECTED';
            statusDiv.className = 'connected';
            connectBtn.textContent = 'Disconnect';
            connectBtn.className = 'btn-disconnect';
            readLoop();
        } catch (e) { alert('Serial Error: ' + e.message); }
    }

    async function readLoop() {
        const decoder = new TextDecoderStream();
        port.readable.pipeTo(decoder.writable);
        reader = decoder.readable.getReader();
        let buffer = '';
        const startTime = Date.now();

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += value;
            let lines = buffer.split('\n');
            buffer = lines.pop();
            for (let line of lines) {
                if (line.includes('~mmHg=')) {
                    let val = parseFloat(line.split('~mmHg=')[1]);
                    if (!isNaN(val)) updateData((Date.now() - startTime) / 1000, val);
                }
            }
        }
    }

    function updateData(time, val) {
        dataBuffer.push({x: time, y: val});
        
        const windowSize = parseFloat(windowInput.value);
        const historySize = parseFloat(historyInput.value);

        // Keep buffer trimmed to history size
        while (dataBuffer.length > 0 && dataBuffer[0].x < time - historySize) {
            dataBuffer.shift();
        }

        // Calculate MAP, SYS, DIA over the specific Window
        const windowData = dataBuffer.filter(d => d.x > time - windowSize);
        if (windowData.length > 0) {
            const values = windowData.map(d => d.y);
            const sum = values.reduce((a, b) => a + b, 0);
            const map = sum / values.length;
            const sys = Math.max(...values);
            const dia = Math.min(...values);

            mapDisplay.textContent = map.toFixed(1);
            sysDisplay.textContent = sys.toFixed(1);
            diaDisplay.textContent = dia.toFixed(1);
            liveDisplay.textContent = val.toFixed(1);

            // Update Chart
            chart.data.datasets[0].data = dataBuffer;
            
            // Just add the latest MAP point to match the waveform
            chart.data.datasets[1].data.push({x: time, y: map});
            if (chart.data.datasets[1].data.length > dataBuffer.length) {
                chart.data.datasets[1].data.shift();
            }

            // Adjust X axis to scroll
            chart.options.scales.x.min = time - historySize;
            chart.options.scales.x.max = time;
            chart.update('none');
        }
    }

    connectBtn.addEventListener('click', () => port ? location.reload() : connect());
    document.getElementById('clearBtn').addEventListener('click', () => {
        dataBuffer = [];
        chart.data.datasets[1].data = [];
        chart.update();
    });
</script>
</body>
</html>
